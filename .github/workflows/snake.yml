name: Generate Pink Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: SeraphicXxx
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=ff69b4&color_dots=ffc0cb,ffb6c1,ff69b4,ff1493,ff69b4

      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
